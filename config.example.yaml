# Del-Fi configuration (v0.2)
# Copy this file to config.yaml and edit it.
# Run --build-wiki before first use to compile your knowledge/ folder.

# --- Required ---
node_name: "MAPLEWOOD-ORACLE"
model: "gemma4:4b"   # Raspberry Pi 5: gemma4:4b. Constrained hardware: gemma4:2b

# --- Optional (sensible defaults shown) ---

# node_description: "Community oracle for Maplewood neighborhood."
# oracle_type: community-hub   # observatory | community-hub | emergency | event | lore
# mesh_protocol: meshtastic    # meshtastic | meshcore
#
# --- Example: Community Hub (default) ---
# node_name: "MAPLEWOOD-ORACLE"
# model: "gemma4:4b"
# wiki_builder_model: "gemma4:12b"
# oracle_type: community-hub
# personality: >
#   You are MAPLEWOOD-ORACLE, a community information hub for the Maplewood
#   neighborhood. You speak plainly. Answer questions about local services,
#   infrastructure, events, and organizations. Redirect emergencies to 911.
#
# --- Example: Wilderness Observatory ---
# node_name: "RIDGELINE"
# model: "gemma4:4b"
# wiki_builder_model: "gemma4:12b"
# oracle_type: observatory
# personality: >
#   You are RIDGELINE, a field science oracle at a remote wilderness
#   observatory. You speak plainly and precisely. Prioritise safety
#   information. Distances in miles, temperatures in Fahrenheit.
#   Two sentences maximum per answer.
#
# --- Example: RPG Game Master ---
# node_name: "DUNGEON-ORACLE"
# model: "gemma4:4b"
# oracle_type: lore
# personality: >
#   You are DUNGEON-ORACLE, the Game Master for The Shattered Realm.
#   You speak in vivid present tense. Every answer moves the adventure forward.
#   2-3 sentences max. Sign off: // DUNGEON-ORACLE
#
# knowledge_folder: ./knowledge
# max_response_bytes: 230
# radio_connection: serial       # serial | tcp | ble
# radio_port: /dev/ttyUSB0       # or hostname:port for TCP
# rate_limit_seconds: 30
# response_cache_ttl: 300
# embedding_model: "nomic-embed-text"
# similarity_threshold: 0.28    # cosine similarity cutoff; higher = stricter
# rag_top_k: 4                   # wiki pages returned per vector query
# num_ctx: 4096                  # cap context window
# num_predict: 300               # max output tokens
# persistent_cache: true
# busy_notice: true
# auto_send_chunks: 3
# channels: []
# log_level: info
# ollama_host: "http://localhost:11434"
# ollama_timeout: 120

# --- Wiki Knowledge System (v0.2) ---
# Run: python main.py --build-wiki   to compile knowledge/ → wiki/
# Run: python main.py --lint-wiki    to check wiki health
#
# wiki_folder: ./wiki                   # compiled wiki output directory
# wiki_builder_model: "gemma4:12b"   # larger model for --build-wiki
#                                       # falls back to 'model' if unset
# wiki_rebuild_on_start: false          # auto-rebuild at daemon startup
# wiki_stale_after_days: 30             # days before --lint-wiki flags a page
# wiki_watch_interval_seconds: 60       # how often to detect knowledge/ changes
#
# time_sensitive_files:                 # these pages get age headers in context
#   - weather-station.md
#   - trail-camera-log.md
#   - community-log.md

# --- Fallback message ---
# Returned when no tier produces an answer (default shown).
# fallback_message: "I don't have docs on that. Try !topics to see what I know."

# --- Sensor / FactStore (Tier 0) ---
# External scripts write sensor readings to cache/sensor_feed.json.
# Queries containing these keywords are answered directly from the feed.
#
# fact_query_keywords:
#   - temperature
#   - humidity
#   - wind
#   - pressure
#   - battery
#   - solar
# fact_watch_interval_seconds: 30

# --- Conversation Memory (off by default) ---
# Enables per-sender conversation history so the oracle remembers
# what it said and to whom.  Each "turn" is one user question +
# one oracle response.  Memory eats context window tokens, so keep
# max_turns low on small models / constrained hardware.
#
# memory_max_turns: 10            # 0 = disabled (default)
# memory_ttl: 3600               # seconds before a convo expires (1 hr)
# persistent_memory: false        # save memory to disk across restarts

# --- Community Board (off by default) ---
# A shared message board.  Users post with !post <message> and
# read with !board (recent) or !board <topic> (search).
# !unpost removes all of a user's own posts.
#
# board_enabled: true
# board_max_posts: 50             # max posts retained
# board_post_ttl: 86400           # seconds before posts expire (24 hrs)
# board_show_count: 5             # posts shown per !board request
# board_persist: true             # save board to disk across restarts
# board_rate_limit: 3             # max posts per sender per window
# board_rate_window: 3600         # rate-limit window in seconds (1 hr)
# board_blocked_patterns:         # extra regex patterns to reject
#   - "badword"
#   - "spam.*link"

# --- MeshCore-specific (only when mesh_protocol: meshcore) ---
#
# meshcore:
#   port: "/dev/ttyUSB0"          # serial port or host:port for TCP
#   connection: serial             # serial | tcp
#   baud_rate: 115200

# --- Trusted Peers + Gossip (Tier 2 / Tier 3) ---
# Peer nodes whose answers are cached locally (Tier 2).
# Gossip announcements build a referral directory (Tier 3, no caching).
#
# trusted_peers:                  # node names to trust for peer cache
#   - MARINA-ORACLE
#   - TRAIL-ANGEL-AT
#
# peer_cache_ttl: 86400           # seconds before peer answers expire (24 hrs)
# max_cache_entries: 500          # max cached peer answers
# gossip_announce_interval: 14400 # seconds between gossip broadcasts (4 hrs)

# --- MeshCore-specific (only when mesh_protocol: meshcore) ---
#
# meshcore:
#   port: "/dev/ttyUSB0"          # serial port or host:port for TCP
#   connection: serial             # serial | tcp
#   baud_rate: 115200
