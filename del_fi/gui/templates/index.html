<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEL-FI GUI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0c0c; --surface: #141414; --surface2: #1c1c1c;
  --fg: #cccccc; --dim: #666; --border: #333;
  --cyan: #54e4e4; --green: #54e454; --yellow: #e4e454;
  --red: #e45454; --magenta: #e454e4;
  --font: 'IBM Plex Mono', 'Courier New', monospace;
  --hdr: 44px; --side: 152px;
}
html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: var(--font); font-size: 13px; }

/* scanlines */
body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(transparent 0,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px); pointer-events:none; z-index:9999; }

/* ── Header ── */
header { position:fixed; top:0; left:0; right:0; height:var(--hdr); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 14px; gap:12px; z-index:100; }
.logo { color:var(--cyan); font-weight:600; letter-spacing:.1em; white-space:nowrap; }
#hdr-node { color:var(--yellow); font-weight:600; flex:1; }
#hdr-ollama { font-size:11px; color:var(--dim); }
#hdr-ollama.ok { color:var(--green); }
#hdr-ollama.err { color:var(--red); }

/* ── Layout ── */
.layout { display:flex; margin-top:var(--hdr); height:calc(100vh - var(--hdr)); }

/* ── Sidebar ── */
nav.sidebar { width:var(--side); flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:8px 0; gap:1px; overflow:hidden; }
nav.sidebar button { width:100%; background:none; border:none; color:var(--dim); font-family:var(--font); font-size:12px; text-align:left; padding:7px 14px; cursor:pointer; white-space:nowrap; border-left:2px solid transparent; }
nav.sidebar button:hover { color:var(--fg); background:var(--surface2); }
nav.sidebar button.active { color:var(--cyan); border-left-color:var(--cyan); background:var(--surface2); }
.sidebar-footer { margin-top:auto; padding:8px 14px 4px; color:var(--dim); font-size:11px; border-top:1px solid var(--border); }

/* ── Content ── */
main.content { flex:1; overflow-y:auto; padding:16px; }
.tab { display:none; }
.tab.active { display:block; }

/* ── Cards ── */
.cards { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.card { background:var(--surface); border:1px solid var(--border); padding:12px 14px; }
.card-title { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
.card-val { font-size:15px; color:var(--cyan); font-weight:600; margin-bottom:4px; }
.card-sub { color:var(--dim); font-size:11px; line-height:1.6; }
.card.ok .card-val { color:var(--green); }
.card.err .card-val { color:var(--red); }

/* ── Toolbar / actions ── */
.toolbar { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.toolbar-right { margin-left:auto; }
.status-msg { font-size:11px; color:var(--dim); }
.status-msg.ok { color:var(--green); }
.status-msg.err { color:var(--red); }

/* ── Buttons ── */
button.btn { background:var(--surface); border:1px solid var(--border); color:var(--fg); font-family:var(--font); font-size:12px; padding:5px 12px; cursor:pointer; }
button.btn:hover { border-color:var(--cyan); color:var(--cyan); }
button.btn:disabled { opacity:.4; cursor:default; }
button.btn.primary { border-color:var(--cyan); color:var(--cyan); }
button.btn.danger { border-color:var(--red); color:var(--red); }
button.btn.success { border-color:var(--green); color:var(--green); }
button.btn.loading::after { content:' …'; color:var(--dim); }

/* ── Output box ── */
.output-box { background:var(--surface); border:1px solid var(--border); padding:10px 12px; font-size:11px; color:var(--dim); max-height:200px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; margin-top:8px; display:none; }
.output-box.visible { display:block; }
.output-box.ok { border-color:var(--green); color:var(--fg); }
.output-box.err { border-color:var(--red); color:var(--red); }

/* ── Config form ── */
.cfg-section { border:1px solid var(--border); margin-bottom:8px; }
.cfg-section-hdr { background:var(--surface2); padding:7px 12px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; user-select:none; font-size:12px; color:var(--fg); }
.cfg-section-hdr:hover { color:var(--cyan); }
.cfg-section-hdr .arrow { color:var(--dim); transition:transform .15s; }
.cfg-section-hdr.collapsed .arrow { transform:rotate(-90deg); }
.cfg-fields { padding:10px 12px; display:grid; grid-template-columns:1fr 1fr; gap:8px 16px; }
.cfg-field { display:flex; flex-direction:column; gap:3px; }
.cfg-field.full { grid-column:1/-1; }
.cfg-field label { color:var(--dim); font-size:11px; }
.cfg-field label .req { color:var(--red); }
input[type=text], input[type=number], select, textarea {
  background:var(--surface); border:1px solid var(--border); color:var(--fg);
  font-family:var(--font); font-size:12px; padding:4px 8px; width:100%;
}
input[type=text]:focus, input[type=number]:focus, select:focus, textarea:focus {
  outline:none; border-color:var(--cyan);
}
textarea { resize:vertical; }
input[type=checkbox] { width:14px; height:14px; cursor:pointer; accent-color:var(--cyan); }
.cfg-bool { flex-direction:row; align-items:center; gap:6px; padding-top:14px; }
.cfg-bool label { color:var(--fg); font-size:12px; }

/* ── Wiki ── */
.wiki-layout { display:flex; gap:12px; min-height:400px; }
.wiki-pages { flex:0 0 260px; background:var(--surface); border:1px solid var(--border); overflow-y:auto; }
.wiki-page-item { padding:8px 12px; border-bottom:1px solid var(--border); cursor:pointer; }
.wiki-page-item:hover { background:var(--surface2); }
.wiki-page-item.active { background:var(--surface2); border-left:2px solid var(--cyan); }
.wiki-page-item .pg-title { color:var(--fg); font-size:12px; }
.wiki-page-item .pg-meta { color:var(--dim); font-size:10px; margin-top:2px; }
.wiki-viewer { flex:1; background:var(--surface); border:1px solid var(--border); padding:12px; overflow-y:auto; }
.wiki-viewer pre { white-space:pre-wrap; word-break:break-word; font-size:12px; line-height:1.6; color:var(--fg); }
.wiki-empty { color:var(--dim); font-size:12px; padding:20px; text-align:center; }
.sources-list { margin-top:12px; }
.source-item { display:flex; justify-content:space-between; padding:5px 12px; border-bottom:1px solid var(--border); font-size:11px; }
.source-item .src-name { color:var(--fg); }
.source-item .src-meta { color:var(--dim); }

/* ── Simulator ── */
.sim-layout { display:flex; flex-direction:column; height:520px; }
.sim-chat { flex:1; overflow-y:auto; padding:8px; background:var(--surface); border:1px solid var(--border); margin-bottom:8px; display:flex; flex-direction:column; gap:6px; }
.sim-msg { max-width:80%; padding:6px 10px; font-size:12px; line-height:1.5; word-break:break-word; }
.sim-msg.sent { align-self:flex-end; background:var(--surface2); border:1px solid var(--cyan); color:var(--cyan); }
.sim-msg.received { align-self:flex-start; background:var(--surface2); border:1px solid var(--border); color:var(--fg); }
.sim-msg.received.err { border-color:var(--red); color:var(--red); }
.sim-msg .sim-sender { font-size:10px; color:var(--dim); margin-bottom:2px; }
.sim-input-row { display:flex; gap:8px; }
.sim-input-row input { flex:1; }
.sim-sender-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:12px; color:var(--dim); }
.sim-sender-row input { width:140px; }

/* ── Board ── */
.post-item { padding:10px 12px; border-bottom:1px solid var(--border); background:var(--surface); }
.post-item .post-text { color:var(--fg); font-size:12px; }
.post-item .post-meta { color:var(--dim); font-size:10px; margin-top:4px; }
.board-form { background:var(--surface); border:1px solid var(--border); padding:12px; margin-top:12px; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.board-form input, .board-form textarea { grid-column:1/-1; }

/* ── Logs ── */
#logs-output { background:var(--surface); border:1px solid var(--border); padding:10px 12px; font-size:11px; color:var(--fg); max-height:580px; overflow-y:auto; white-space:pre; font-family:var(--font); }
.log-line:nth-child(even) { color:var(--dim); }

/* ── Toast ── */
#toast { position:fixed; top:54px; right:14px; padding:7px 14px; background:var(--surface); border:1px solid var(--border); font-size:12px; z-index:200; display:none; }
#toast.ok { border-color:var(--green); color:var(--green); }
#toast.err { border-color:var(--red); color:var(--red); }
#toast.warn { border-color:var(--yellow); color:var(--yellow); }

/* ── Misc ── */
.section-title { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; margin-top:4px; }
.empty-note { color:var(--dim); font-size:12px; padding:12px; text-align:center; }
hr { border:none; border-top:1px solid var(--border); margin:12px 0; }
</style>
</head>
<body>

<header>
  <span class="logo">·· DEL-FI ··</span>
  <span id="hdr-node">—</span>
  <span id="hdr-model" style="color:var(--dim);font-size:11px;"></span>
  <span id="hdr-ollama" class="err">ollama: —</span>
  <span style="color:var(--dim);font-size:11px;">v0.2</span>
</header>

<div class="layout">
  <nav class="sidebar">
    <button class="active" onclick="showTab('dashboard')">[ Dashboard ]</button>
    <button onclick="showTab('config')">[ Config ]</button>
    <button onclick="showTab('wiki')">[ Wiki ]</button>
    <button onclick="showTab('simulator')">[ Simulator ]</button>
    <button onclick="showTab('board')">[ Board ]</button>
    <button onclick="showTab('logs')">[ Logs ]</button>
    <div class="sidebar-footer" id="sidebar-footer"></div>
  </nav>

  <main class="content">

    <!-- ── Dashboard ── -->
    <div id="tab-dashboard" class="tab active">
      <div class="section-title">ORACLE STATUS</div>
      <div class="cards" id="dash-cards">
        <div class="card"><div class="card-title">Oracle</div><div class="card-val" id="dc-name">—</div><div class="card-sub" id="dc-type"></div></div>
        <div class="card" id="dc-ollama-card"><div class="card-title">Ollama</div><div class="card-val" id="dc-ollama">—</div><div class="card-sub" id="dc-models"></div></div>
        <div class="card"><div class="card-title">Wiki</div><div class="card-val" id="dc-pages">—</div><div class="card-sub" id="dc-sources"></div></div>
        <div class="card"><div class="card-title">Config</div><div class="card-val" style="font-size:11px;color:var(--dim)" id="dc-config">—</div><div class="card-sub" id="dc-uptime"></div></div>
      </div>
      <div class="section-title">QUICK ACTIONS</div>
      <div class="toolbar">
        <button class="btn primary" onclick="dashBuildWiki(this)">Build Wiki</button>
        <button class="btn" onclick="dashLintWiki(this)">Lint Wiki</button>
        <button class="btn" onclick="showTab('simulator')">Open Simulator</button>
        <button class="btn" onclick="loadDashboard()">Refresh</button>
      </div>
      <div id="dash-output" class="output-box"></div>
    </div>

    <!-- ── Config ── -->
    <div id="tab-config" class="tab">
      <div class="toolbar">
        <button class="btn primary" onclick="saveConfig(this)">Save Config</button>
        <button class="btn" onclick="loadConfig()">Reload</button>
        <span id="cfg-status" class="status-msg"></span>
      </div>
      <div id="config-form"></div>
    </div>

    <!-- ── Wiki ── -->
    <div id="tab-wiki" class="tab">
      <div class="toolbar">
        <button class="btn primary" onclick="buildWiki(this)">Build Wiki</button>
        <button class="btn" onclick="lintWiki(this)">Lint Wiki</button>
        <button class="btn" onclick="loadWiki()">Refresh</button>
        <span id="wiki-status" class="status-msg toolbar-right"></span>
      </div>
      <div id="wiki-build-output" class="output-box"></div>
      <hr>
      <div class="wiki-layout">
        <div class="wiki-pages" id="wiki-page-list">
          <div class="empty-note">loading…</div>
        </div>
        <div class="wiki-viewer" id="wiki-viewer">
          <div class="wiki-empty">Select a page to view its content.</div>
        </div>
      </div>
      <hr>
      <div class="section-title">SOURCE FILES  <span id="wiki-src-folder" style="color:var(--dim);font-size:11px;font-weight:400;"></span></div>
      <div id="wiki-sources"></div>
    </div>

    <!-- ── Simulator ── -->
    <div id="tab-simulator" class="tab">
      <div class="sim-sender-row">
        <span>Sender ID:</span>
        <input type="text" id="sim-sender" value="!gui00000" maxlength="20">
        <button class="btn danger" onclick="clearSim()">Clear</button>
        <span id="sim-status" class="status-msg" style="margin-left:auto;"></span>
      </div>
      <div class="sim-layout">
        <div class="sim-chat" id="sim-chat">
          <div class="empty-note" style="margin:auto;">Send a message to test the oracle. Commands like !help and !topics work too.</div>
        </div>
        <div class="sim-input-row">
          <input type="text" id="sim-input" placeholder="Type a message or command…" onkeydown="if(event.key==='Enter')sendSim()">
          <button class="btn primary" id="sim-send-btn" onclick="sendSim()">Send ▶</button>
        </div>
      </div>
    </div>

    <!-- ── Board ── -->
    <div id="tab-board" class="tab">
      <div class="toolbar">
        <button class="btn" onclick="loadBoard()">Refresh</button>
        <span id="board-count" class="status-msg"></span>
      </div>
      <div id="board-posts"></div>
      <div class="board-form">
        <div class="section-title" style="grid-column:1/-1;margin:0 0 4px;">POST VIA SIMULATOR</div>
        <div class="cfg-field">
          <label>Sender ID</label>
          <input type="text" id="bp-sender" value="!gui00000" maxlength="20">
        </div>
        <div class="cfg-field">
          <label>Message (max 200 chars)</label>
          <input type="text" id="bp-text" maxlength="200" placeholder="Your post text…">
        </div>
        <button class="btn primary" onclick="boardPost(this)">Post via Simulator</button>
      </div>
    </div>

    <!-- ── Logs ── -->
    <div id="tab-logs" class="tab">
      <div class="toolbar">
        <label style="color:var(--dim);font-size:11px;">Lines:</label>
        <select id="log-lines" style="width:80px;" onchange="loadLogs()">
          <option value="50">50</option>
          <option value="100" selected>100</option>
          <option value="200">200</option>
          <option value="500">500</option>
        </select>
        <button class="btn" onclick="loadLogs()">Refresh</button>
        <button class="btn" id="auto-log-btn" onclick="toggleAutoLogs()">Auto: Off</button>
        <span id="log-file" class="status-msg toolbar-right"></span>
      </div>
      <div id="logs-output"></div>
    </div>

  </main>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let gStatus = null;
let gConfig = {};
let gConfigDirty = false;
let gLogsInterval = null;
let gCurrentTab = 'dashboard';

// ── Config Schema ──────────────────────────────────────────────────────────
const CFG_SCHEMA = [
  { id:'identity', label:'Identity', fields:[
    { key:'node_name',    label:'Node Name',        type:'text',   required:true, placeholder:'RIDGELINE' },
    { key:'oracle_type',  label:'Oracle Type',      type:'select', options:['','observatory','community-hub','emergency','event','lore'] },
    { key:'personality',  label:'Personality Prompt', type:'textarea', rows:4, full:true },
    { key:'description',  label:'Description',      type:'text',   full:true },
    { key:'fallback_message', label:'Fallback Message', type:'text', full:true, placeholder:"I don't have docs on that. Try !topics to see what I know." },
  ]},
  { id:'model', label:'Model & Ollama', fields:[
    { key:'model',               label:'Serving Model',       type:'text',   required:true, placeholder:'gemma4:4b', def:'gemma4:4b' },
    { key:'wiki_builder_model',  label:'Wiki Builder Model',  type:'text',   placeholder:'gemma4:12b (optional)' },
    { key:'ollama_host',         label:'Ollama Host',         type:'text',   def:'http://localhost:11434' },
    { key:'ollama_timeout',      label:'Query Timeout (s)',   type:'number', def:120, min:5 },
    { key:'wiki_build_timeout',  label:'Build Timeout (s)',   type:'number', def:600, min:60 },
    { key:'num_ctx',             label:'Context Window',      type:'number', nullable:true, placeholder:'auto (per model)' },
    { key:'num_predict',         label:'Max Output Tokens',   type:'number', def:300 },
    { key:'embedding_model',     label:'Embedding Model',     type:'text',   def:'nomic-embed-text' },
  ]},
  { id:'radio', label:'Radio', fields:[
    { key:'mesh_protocol',      label:'Protocol',          type:'select', options:['meshtastic','meshcore'] },
    { key:'radio_connection',   label:'Connection',        type:'select', options:['serial','tcp','ble'] },
    { key:'radio_port',         label:'Port / Host:Port',  type:'text',   placeholder:'/dev/ttyUSB0' },
    { key:'rate_limit_seconds', label:'Rate Limit (s)',    type:'number', def:30, min:0 },
    { key:'channels',           label:'Channels (one per line)', type:'list', full:true },
  ]},
  { id:'wiki', label:'Wiki & Knowledge', fields:[
    { key:'wiki_folder',               label:'Wiki Folder',            type:'text',   def:'./wiki' },
    { key:'knowledge_folder',          label:'Knowledge Folder',       type:'text',   def:'./knowledge' },
    { key:'wiki_rebuild_on_start',     label:'Rebuild Wiki on Startup',type:'bool' },
    { key:'wiki_stale_after_days',     label:'Stale After (days)',     type:'number', def:30, min:1 },
    { key:'wiki_watch_interval_seconds',label:'Watch Interval (s)',    type:'number', def:60 },
    { key:'time_sensitive_files',      label:'Time-Sensitive Files (one per line)', type:'list', full:true },
  ]},
  { id:'retrieval', label:'Retrieval', fields:[
    { key:'similarity_threshold', label:'Similarity Threshold', type:'number', def:0.28, step:'0.01', min:0, max:1 },
    { key:'rag_top_k',            label:'Top-K Wiki Pages',     type:'number', def:4, min:1 },
    { key:'max_context_tokens',   label:'Max Context Tokens',   type:'number', nullable:true, placeholder:'auto' },
    { key:'max_response_bytes',   label:'Max Response Bytes',   type:'number', def:230, min:50, max:256 },
  ]},
  { id:'cache', label:'Cache & Response', fields:[
    { key:'persistent_cache',    label:'Persistent Cache',   type:'bool' },
    { key:'response_cache_ttl',  label:'Cache TTL (s)',      type:'number', def:300 },
    { key:'auto_send_chunks',    label:'Auto-Send Chunks',   type:'number', def:3 },
    { key:'busy_notice',         label:'Busy Notice',        type:'bool' },
  ]},
  { id:'memory', label:'Conversation Memory', fields:[
    { key:'memory_max_turns',   label:'Max Turns (0 = off)',  type:'number', def:0, min:0 },
    { key:'memory_ttl',         label:'Memory TTL (s)',        type:'number', def:3600 },
    { key:'persistent_memory',  label:'Persistent Memory',    type:'bool' },
  ]},
  { id:'board', label:'Community Board', fields:[
    { key:'board_enabled',      label:'Enable Board',         type:'bool' },
    { key:'board_max_posts',    label:'Max Posts',            type:'number', def:50 },
    { key:'board_post_ttl',     label:'Post TTL (s)',         type:'number', def:86400 },
    { key:'board_show_count',   label:'Posts per !board',     type:'number', def:5 },
    { key:'board_persist',      label:'Persist Board',        type:'bool' },
    { key:'board_rate_limit',   label:'Rate Limit (posts)',   type:'number', def:3 },
    { key:'board_rate_window',  label:'Rate Window (s)',      type:'number', def:3600 },
  ]},
  { id:'facts', label:'Sensor Facts (Tier 0)', fields:[
    { key:'fact_feed_file',              label:'Sensor Feed File',      type:'text',   placeholder:'cache/sensor_feed.json' },
    { key:'fact_watch_interval_seconds', label:'Watch Interval (s)',    type:'number', def:30 },
    { key:'fact_query_keywords',         label:'Keywords (one per line)', type:'list', full:true },
  ]},
  { id:'logging', label:'Logging', fields:[
    { key:'log_level', label:'Log Level', type:'select', options:['debug','info','warning','error'] },
  ]},
];

// ── Helpers ────────────────────────────────────────────────────────────────
async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok && res.status !== 404) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function fmtUptime(s) {
  if (s < 60) return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return `${h}h ${m}m`;
}

function fmtTs(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' ' + d.toLocaleDateString();
}

function fmtBytes(n) {
  if (n < 1024) return `${n}B`;
  return `${(n/1024).toFixed(1)}KB`;
}

let _toastTimer = null;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.style.display='none'; }, 3000);
}

function showOutput(id, text, ok) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'output-box visible ' + (ok ? 'ok' : 'err');
}

function setBtn(btn, loading) {
  btn.disabled = loading;
  btn.classList.toggle('loading', loading);
}

// ── Tab Navigation ─────────────────────────────────────────────────────────
function showTab(name) {
  if (gCurrentTab === name) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav.sidebar button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelector(`nav.sidebar button[onclick="showTab('${name}')"]`).classList.add('active');
  gCurrentTab = name;

  if (name === 'dashboard') loadDashboard();
  else if (name === 'config') loadConfig();
  else if (name === 'wiki') loadWiki();
  else if (name === 'board') loadBoard();
  else if (name === 'logs') loadLogs();
}

// ── Dashboard ──────────────────────────────────────────────────────────────
async function loadDashboard() {
  try {
    gStatus = await api('/api/status');
    const s = gStatus;
    document.getElementById('hdr-node').textContent = s.node_name;
    document.getElementById('hdr-model').textContent = s.model;
    const ho = document.getElementById('hdr-ollama');
    ho.textContent = 'ollama: ' + (s.ollama_ok ? '● ok' : '● down');
    ho.className = s.ollama_ok ? 'ok' : 'err';

    document.getElementById('dc-name').textContent = s.node_name;
    document.getElementById('dc-type').innerHTML = [
      s.model, s.oracle_type || 'oracle'
    ].filter(Boolean).join(' · ');

    const oc = document.getElementById('dc-ollama-card');
    document.getElementById('dc-ollama').textContent = s.ollama_ok ? '● connected' : '● down';
    oc.className = 'card ' + (s.ollama_ok ? 'ok' : 'err');
    document.getElementById('dc-models').textContent = s.ollama_models.length
      ? s.ollama_models.slice(0,4).join(', ')
      : s.ollama_host;

    document.getElementById('dc-pages').textContent =
      s.wiki_page_count + ' wiki page' + (s.wiki_page_count!==1?'s':'');
    document.getElementById('dc-sources').textContent =
      s.knowledge_file_count + ' source file' + (s.knowledge_file_count!==1?'s':'') +
      (s.knowledge_folder ? '\n' + s.knowledge_folder : '');
    document.getElementById('dc-config').textContent = s.config_path;
    document.getElementById('dc-uptime').textContent = 'uptime: ' + fmtUptime(s.uptime_s);
    document.getElementById('sidebar-footer').textContent = s.node_name;
  } catch(e) {
    toast('status error: ' + e.message, 'err');
  }
}

async function dashBuildWiki(btn) {
  setBtn(btn, true);
  showOutput('dash-output', 'Building wiki…', true);
  try {
    const r = await api('/api/wiki/build', {method:'POST'});
    showOutput('dash-output', (r.stdout || '') + (r.stderr || ''), r.ok);
    toast(r.ok ? 'Wiki built.' : 'Build failed.', r.ok ? 'ok' : 'err');
    loadDashboard();
  } catch(e) {
    showOutput('dash-output', e.message, false);
  }
  setBtn(btn, false);
}

async function dashLintWiki(btn) {
  setBtn(btn, true);
  try {
    const r = await api('/api/wiki/lint', {method:'POST'});
    showOutput('dash-output', (r.stdout || '') + (r.stderr || ''), r.ok);
    toast(r.ok ? 'Wiki clean.' : 'Issues found.', r.ok ? 'ok' : 'warn');
  } catch(e) {
    showOutput('dash-output', e.message, false);
  }
  setBtn(btn, false);
}

// ── Config ─────────────────────────────────────────────────────────────────
async function loadConfig() {
  try {
    const r = await api('/api/config');
    gConfig = r.config || {};
    gConfigDirty = false;
    buildConfigForm(gConfig);
    document.getElementById('cfg-status').textContent = '';
    document.getElementById('cfg-status').className = 'status-msg';
  } catch(e) {
    toast('config load error: ' + e.message, 'err');
  }
}

function buildConfigForm(cfg) {
  const form = document.getElementById('config-form');
  form.innerHTML = '';
  CFG_SCHEMA.forEach(section => {
    const sec = document.createElement('div');
    sec.className = 'cfg-section';

    const hdr = document.createElement('div');
    hdr.className = 'cfg-section-hdr';
    hdr.innerHTML = `${section.label} <span class="arrow">▾</span>`;
    hdr.onclick = () => {
      hdr.classList.toggle('collapsed');
      fields.style.display = hdr.classList.contains('collapsed') ? 'none' : 'grid';
    };
    sec.appendChild(hdr);

    const fields = document.createElement('div');
    fields.className = 'cfg-fields';
    fields.id = 'sec-' + section.id;

    section.fields.forEach(f => {
      const val = cfg[f.key];
      fields.appendChild(buildField(f, val));
    });

    sec.appendChild(fields);
    form.appendChild(sec);
  });
}

function buildField(f, value) {
  const wrap = document.createElement('div');
  wrap.className = 'cfg-field' + (f.full ? ' full' : '');

  if (f.type === 'bool') {
    wrap.classList.add('cfg-bool');
    const inp = document.createElement('input');
    inp.type = 'checkbox';
    inp.id = 'f-' + f.key;
    inp.dataset.key = f.key;
    inp.dataset.ftype = 'bool';
    inp.checked = !!(value !== undefined ? value : false);
    inp.onchange = markDirty;
    const lbl = document.createElement('label');
    lbl.setAttribute('for', 'f-' + f.key);
    lbl.textContent = f.label;
    wrap.appendChild(inp);
    wrap.appendChild(lbl);
    return wrap;
  }

  const lbl = document.createElement('label');
  lbl.setAttribute('for', 'f-' + f.key);
  lbl.innerHTML = f.label + (f.required ? ' <span class="req">*</span>' : '');
  wrap.appendChild(lbl);

  let inp;
  if (f.type === 'select') {
    inp = document.createElement('select');
    inp.id = 'f-' + f.key;
    inp.dataset.key = f.key;
    inp.dataset.ftype = 'select';
    (f.options || []).forEach(opt => {
      const o = document.createElement('option');
      o.value = opt;
      o.textContent = opt || '— default —';
      if ((value !== undefined ? value : (f.def || '')) === opt) o.selected = true;
      inp.appendChild(o);
    });
  } else if (f.type === 'textarea' || f.type === 'list') {
    inp = document.createElement('textarea');
    inp.id = 'f-' + f.key;
    inp.dataset.key = f.key;
    inp.dataset.ftype = f.type;
    inp.rows = f.rows || 3;
    if (f.type === 'list') {
      inp.value = Array.isArray(value) ? value.join('\n') : (value || '');
    } else {
      inp.value = value !== undefined ? value : (f.def || '');
    }
  } else {
    inp = document.createElement('input');
    inp.type = f.type === 'number' ? 'number' : 'text';
    inp.id = 'f-' + f.key;
    inp.dataset.key = f.key;
    inp.dataset.ftype = f.type === 'number' ? 'number' : 'text';
    if (f.step) inp.step = f.step;
    if (f.min !== undefined) inp.min = f.min;
    if (f.max !== undefined) inp.max = f.max;
    if (f.placeholder) inp.placeholder = f.placeholder;
    else if (f.def !== undefined) inp.placeholder = String(f.def);
    if (f.type === 'number') {
      inp.value = (value !== null && value !== undefined) ? value : '';
    } else {
      inp.value = value !== undefined ? (value || '') : '';
    }
  }

  inp.oninput = markDirty;
  inp.onchange = markDirty;
  wrap.appendChild(inp);
  return wrap;
}

function collectConfigForm() {
  const cfg = {};
  document.querySelectorAll('#config-form [data-key]').forEach(el => {
    const key = el.dataset.key;
    const ft = el.dataset.ftype;
    let val;
    if (ft === 'bool') {
      val = el.checked;
    } else if (ft === 'number') {
      if (el.value === '') {
        val = null;
      } else {
        val = el.step && parseFloat(el.step) < 1 ? parseFloat(el.value) : parseInt(el.value, 10);
        if (isNaN(val)) val = null;
      }
    } else if (ft === 'list') {
      val = el.value.trim() ? el.value.trim().split('\n').map(l=>l.trim()).filter(l=>l) : null;
    } else {
      val = el.value.trim() || null;
    }
    if (val !== null && val !== undefined) cfg[key] = val;
  });
  return cfg;
}

function markDirty() {
  if (!gConfigDirty) {
    gConfigDirty = true;
    const st = document.getElementById('cfg-status');
    st.textContent = '● unsaved changes';
    st.className = 'status-msg warn';
  }
}

async function saveConfig(btn) {
  const cfg = collectConfigForm();
  if (!cfg.node_name) { toast('node_name is required', 'err'); return; }
  if (!cfg.model) { toast('model is required', 'err'); return; }
  setBtn(btn, true);
  try {
    const r = await api('/api/config', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({config: cfg}),
    });
    if (r.ok) {
      gConfigDirty = false;
      const st = document.getElementById('cfg-status');
      st.textContent = '✓ saved';
      st.className = 'status-msg ok';
      toast('Config saved.', 'ok');
      loadDashboard();
    } else {
      toast('Save failed: ' + r.error, 'err');
    }
  } catch(e) {
    toast('Save error: ' + e.message, 'err');
  }
  setBtn(btn, false);
}

// ── Wiki ───────────────────────────────────────────────────────────────────
async function loadWiki() {
  document.getElementById('wiki-status').textContent = '';
  try {
    const [pr, kr] = await Promise.all([
      api('/api/wiki/pages'),
      api('/api/knowledge/files'),
    ]);
    renderWikiPages(pr.pages || []);
    renderSources(kr.files || [], kr.folder || '');
  } catch(e) {
    toast('wiki load error: ' + e.message, 'err');
  }
}

function renderWikiPages(pages) {
  const list = document.getElementById('wiki-page-list');
  if (!pages.length) {
    list.innerHTML = '<div class="empty-note">No wiki pages.<br>Run Build Wiki first.</div>';
    return;
  }
  list.innerHTML = '';
  pages.forEach(p => {
    const item = document.createElement('div');
    item.className = 'wiki-page-item';
    item.innerHTML = `<div class="pg-title">${esc(p.title)}</div>
      <div class="pg-meta">${p.last_ingested || ''}${p.size ? '  ' + fmtBytes(p.size) : ''}</div>`;
    item.onclick = () => {
      document.querySelectorAll('.wiki-page-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      viewWikiPage(p.slug);
    };
    list.appendChild(item);
  });
}

async function viewWikiPage(slug) {
  const viewer = document.getElementById('wiki-viewer');
  viewer.innerHTML = '<div class="wiki-empty">Loading…</div>';
  try {
    const r = await api('/api/wiki/page/' + encodeURIComponent(slug));
    if (r.ok) {
      viewer.innerHTML = '<pre>' + esc(r.content) + '</pre>';
    } else {
      viewer.innerHTML = '<div class="wiki-empty">Not found.</div>';
    }
  } catch(e) {
    viewer.innerHTML = '<div class="wiki-empty">Error: ' + esc(e.message) + '</div>';
  }
}

function renderSources(files, folder) {
  document.getElementById('wiki-src-folder').textContent = folder;
  const el = document.getElementById('wiki-sources');
  if (!files.length) {
    el.innerHTML = '<div class="empty-note">No source files in knowledge/ folder.</div>';
    return;
  }
  el.innerHTML = '<div class="sources-list">'
    + files.map(f => `<div class="source-item">
        <span class="src-name">${esc(f.name)}</span>
        <span class="src-meta">${fmtBytes(f.size)} · ${new Date(f.modified*1000).toLocaleDateString()}</span>
      </div>`).join('')
    + '</div>';
}

async function buildWiki(btn) {
  const st = document.getElementById('wiki-status');
  st.textContent = 'building…';
  st.className = 'status-msg';
  setBtn(btn, true);
  try {
    const r = await api('/api/wiki/build', {method:'POST'});
    showOutput('wiki-build-output', (r.stdout||'') + (r.stderr||''), r.ok);
    st.textContent = r.ok ? '✓ built' : '✗ failed';
    st.className = 'status-msg ' + (r.ok ? 'ok' : 'err');
    toast(r.ok ? 'Wiki built.' : 'Build failed.', r.ok ? 'ok' : 'err');
    if (r.ok) loadWiki();
  } catch(e) {
    st.textContent = '✗ error';
    st.className = 'status-msg err';
    showOutput('wiki-build-output', e.message, false);
  }
  setBtn(btn, false);
}

async function lintWiki(btn) {
  const st = document.getElementById('wiki-status');
  st.textContent = 'linting…';
  setBtn(btn, true);
  try {
    const r = await api('/api/wiki/lint', {method:'POST'});
    showOutput('wiki-build-output', (r.stdout||'') + (r.stderr||''), r.ok);
    st.textContent = r.ok ? '✓ clean' : '⚠ issues';
    st.className = 'status-msg ' + (r.ok ? 'ok' : 'warn');
    toast(r.ok ? 'Wiki clean.' : 'Issues found — see output.', r.ok ? 'ok' : 'warn');
  } catch(e) {
    st.textContent = '✗ error';
    st.className = 'status-msg err';
  }
  setBtn(btn, false);
}

// ── Simulator ──────────────────────────────────────────────────────────────
function clearSim() {
  document.getElementById('sim-chat').innerHTML =
    '<div class="empty-note" style="margin:auto;">History cleared.</div>';
}

function appendSimMsg(text, side) {
  const chat = document.getElementById('sim-chat');
  const empty = chat.querySelector('.empty-note');
  if (empty) empty.remove();
  const msg = document.createElement('div');
  msg.className = 'sim-msg ' + side;
  if (side === 'sent') {
    msg.textContent = text;
  } else {
    const label = document.createElement('div');
    label.className = 'sim-sender';
    label.textContent = 'ORACLE';
    msg.appendChild(label);
    const body = document.createElement('div');
    body.textContent = text;
    msg.appendChild(body);
  }
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

async function sendSim() {
  const inp = document.getElementById('sim-input');
  const text = inp.value.trim();
  if (!text) return;
  const sender = document.getElementById('sim-sender').value.trim() || '!gui00000';
  inp.value = '';
  appendSimMsg(text, 'sent');

  const btn = document.getElementById('sim-send-btn');
  setBtn(btn, true);
  const st = document.getElementById('sim-status');
  st.textContent = 'thinking…';
  st.className = 'status-msg';

  try {
    const r = await api('/api/simulate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({sender, text}),
    });
    st.textContent = '';
    if (r.ok) {
      (r.responses || []).forEach(resp => appendSimMsg(resp, 'received'));
      if (!r.responses || !r.responses.length) appendSimMsg('(no response)', 'received err');
    } else {
      const err = document.createElement('div');
      err.className = 'sim-msg received err';
      err.textContent = 'Error: ' + (r.error || 'unknown');
      document.getElementById('sim-chat').appendChild(err);
    }
  } catch(e) {
    st.textContent = 'error';
    st.className = 'status-msg err';
    appendSimMsg('Network error: ' + e.message, 'received err');
  }
  setBtn(btn, false);
  inp.focus();
}

// ── Board ──────────────────────────────────────────────────────────────────
async function loadBoard() {
  try {
    const r = await api('/api/board');
    const posts = r.posts || [];
    document.getElementById('board-count').textContent = posts.length + ' post' + (posts.length!==1?'s':'');
    const el = document.getElementById('board-posts');
    if (!posts.length) {
      el.innerHTML = '<div class="empty-note">No posts.</div>';
      return;
    }
    // Sort newest first
    posts.sort((a,b) => b.ts - a.ts);
    el.innerHTML = posts.map(p =>
      `<div class="post-item">
        <div class="post-text">${esc(p.text)}</div>
        <div class="post-meta">${esc(p.sender || '?')} · ${fmtTs(p.ts || 0)}</div>
      </div>`
    ).join('');
  } catch(e) {
    toast('board error: ' + e.message, 'err');
  }
}

async function boardPost(btn) {
  const sender = document.getElementById('bp-sender').value.trim() || '!gui00000';
  const text = document.getElementById('bp-text').value.trim();
  if (!text) { toast('Enter post text', 'warn'); return; }
  setBtn(btn, true);
  try {
    const r = await api('/api/simulate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({sender, text: '!post ' + text}),
    });
    if (r.ok) {
      document.getElementById('bp-text').value = '';
      toast((r.responses && r.responses[0]) || 'Posted.', 'ok');
      loadBoard();
    } else {
      toast('Post failed: ' + (r.error || ''), 'err');
    }
  } catch(e) {
    toast('error: ' + e.message, 'err');
  }
  setBtn(btn, false);
}

// ── Logs ───────────────────────────────────────────────────────────────────
async function loadLogs() {
  const n = document.getElementById('log-lines').value;
  try {
    const r = await api('/api/logs?lines=' + n);
    document.getElementById('log-file').textContent = r.file || '';
    const el = document.getElementById('logs-output');
    if (!r.lines || !r.lines.length) {
      el.innerHTML = '<span style="color:var(--dim)">No log file yet. Run the daemon to generate logs.</span>';
      return;
    }
    el.innerHTML = r.lines.map((l,i) =>
      `<div class="log-line">${esc(l)}</div>`
    ).join('');
    el.scrollTop = el.scrollHeight;
  } catch(e) {
    toast('logs error: ' + e.message, 'err');
  }
}

function toggleAutoLogs() {
  const btn = document.getElementById('auto-log-btn');
  if (gLogsInterval) {
    clearInterval(gLogsInterval);
    gLogsInterval = null;
    btn.textContent = 'Auto: Off';
    btn.classList.remove('success');
  } else {
    gLogsInterval = setInterval(loadLogs, 3000);
    btn.textContent = 'Auto: On';
    btn.classList.add('success');
    loadLogs();
  }
}

// ── Utility ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadDashboard();
});
</script>
